<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF Solver – Student Homework App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e; /* Green */
            --primary-dark: #16a34a;
            --secondary: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff !important; /* Strictly White */
            color: #1e293b;
            min-height: 100vh;
        }

        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .subject-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid #f1f5f9;
            background: #ffffff;
        }

        .subject-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        
        /* Green Selected State */
        .subject-card.selected {
            border-color: var(--primary);
            background: #f0fdf4;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        #solution-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        #solution-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        #solution-content p { margin-bottom: 1rem; line-height: 1.6; }
        
        /* Ensure result area is clean */
        .result-card {
            background: white;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="p-0 m-0">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleSidebar()"></div>
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-[80%] md:w-80 bg-white z-50 shadow-2xl transform -translate-x-full sidebar-transition p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold">Settings</h2>
            <button onclick="toggleSidebar()" class="text-gray-500">✕</button>
        </div>
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Language</label>
                <input type="text" id="pref-lang" value="English" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Response Tone</label>
                <select id="pref-tone" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                    <option value="Encouraging">Encouraging 🌟</option>
                    <option value="Formal">Formal 🎓</option>
                    <option value="Simple">Simple 👶</option>
                </select>
            </div>
        </div>
        <div class="absolute bottom-6 left-6 text-xs text-gray-400">
            Version 1.2 • Model: Gemini 1.5 Flash
        </div>
    </aside>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <header class="flex items-center justify-between mb-8">
            <button onclick="toggleSidebar()" class="p-2 bg-white border border-gray-200 rounded-lg shadow-sm hover:bg-gray-50">☰</button>
            <div class="text-center">
                <h1 class="text-3xl font-black bg-gradient-to-r from-green-600 to-emerald-600 bg-clip-text text-transparent">CF Solver</h1>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Intelligent Homework Assistant</p>
            </div>
            <div class="w-8"></div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
            <div class="subject-card p-4 rounded-2xl text-center" onclick="selectSubject('Mathematics', '➗', this)">
                <div class="text-2xl mb-1">➗</div><div class="font-bold text-sm">Mathematics</div>
            </div>
            <div class="subject-card p-4 rounded-2xl text-center" onclick="selectSubject('Science', '🧪', this)">
                <div class="text-2xl mb-1">🧪</div><div class="font-bold text-sm">Science</div>
            </div>
            <div class="subject-card p-4 rounded-2xl text-center" onclick="selectSubject('History', '📜', this)">
                <div class="text-2xl mb-1">📜</div><div class="font-bold text-sm">History</div>
            </div>
            <div class="subject-card p-4 rounded-2xl text-center" onclick="selectSubject('English', '📚', this)">
                <div class="text-2xl mb-1">📚</div><div class="font-bold text-sm">English</div>
            </div>
            <div class="subject-card p-4 rounded-2xl text-center" onclick="selectSubject('Computer Science', '💻', this)">
                <div class="text-2xl mb-1">💻</div><div class="font-bold text-sm">CS</div>
            </div>
            <div class="subject-card p-4 rounded-2xl text-center selected" id="default-subject" onclick="selectSubject('General', '✨', this)">
                <div class="text-2xl mb-1">✨</div><div class="font-bold text-sm">General</div>
            </div>
        </div>
        <p id="subject-indicator" class="text-center text-green-600 font-bold text-sm mb-8">Selected: General ✨</p>

        <div class="bg-white rounded-3xl border border-gray-200 shadow-lg p-6 mb-6">
            <h3 class="font-bold mb-4">Ask a Question ✍️</h3>
            <textarea id="user-input" rows="4" class="w-full p-4 bg-gray-50 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-green-500 transition-all border border-gray-100" placeholder="Describe your problem..."></textarea>
            
            <div class="flex flex-col md:flex-row gap-4">
                <label class="flex-1 flex items-center justify-center gap-2 p-3 bg-green-50 text-green-700 rounded-xl cursor-pointer font-semibold border border-green-100 hover:bg-green-100 transition-colors">
                    <span>📷 Upload Image</span>
                    <input type="file" id="image-upload" hidden onchange="previewImage(event)">
                </label>
                <button id="submit-btn" disabled onclick="solve()" class="flex-1 p-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold disabled:opacity-50 flex items-center justify-center gap-2 transition-all shadow-md active:scale-95">
                    <span id="btn-text">Get Solution Instantly</span>
                    <div id="loader" class="loader hidden"></div>
                </button>
            </div>

            <div id="preview-box" class="mt-4 hidden relative w-32 h-32">
                <img id="img-render" class="w-full h-full object-cover rounded-lg border">
                <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs">✕</button>
            </div>
        </div>

        <div id="error-box" class="hidden p-4 bg-red-50 text-red-700 rounded-xl mb-6 border border-red-100"></div>
        
        <div id="result-area" class="hidden bg-white rounded-3xl border border-gray-200 shadow-xl overflow-hidden mb-8">
            <div class="bg-green-600 p-4 text-white font-bold flex items-center gap-2">
                <span>AI Solution</span>
                <span class="text-green-200">💡</span>
            </div>
            <div id="solution-content" class="p-6 text-gray-800 bg-white"></div>
        </div>
    </main>

    <script>
        // UPDATED API CONFIGURATION
        const API_KEY = "AIzaSyD8GYESFDOSjL7t3G6i7eSIHsMg6SXiVIc";
        const MODEL = "gemini-1.5-flash"; // Corrected Model Name
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

        let currentSubject = "General";
        let imageBase64 = null;
        let imageType = null;

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebar-overlay');
            sb.classList.toggle('-translate-x-full');
            ov.classList.toggle('hidden');
        }

        function selectSubject(name, emoji, el) {
            currentSubject = name;
            document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('subject-indicator').innerText = `Selected: ${name} ${emoji}`;
        }

        const inputEl = document.getElementById('user-input');
        inputEl.addEventListener('input', validate);

        function validate() {
            document.getElementById('submit-btn').disabled = !(inputEl.value.trim() || imageBase64);
        }

        function previewImage(e) {
            const file = e.target.files[0];
            if(!file) return;
            imageType = file.type;
            const reader = new FileReader();
            reader.onload = (ev) => {
                imageBase64 = ev.target.result.split(',')[1];
                document.getElementById('img-render').src = ev.target.result;
                document.getElementById('preview-box').classList.remove('hidden');
                validate();
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            imageBase64 = null;
            document.getElementById('image-upload').value = '';
            document.getElementById('preview-box').classList.add('hidden');
            validate();
        }

        async function solve() {
            const btn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader');
            const btnTxt = document.getElementById('btn-text');
            const errorBox = document.getElementById('error-box');
            const resultArea = document.getElementById('result-area');

            errorBox.classList.add('hidden');
            resultArea.classList.add('hidden');
            btn.disabled = true;
            loader.classList.remove('hidden');
            btnTxt.classList.add('hidden');

            const tone = document.getElementById('pref-tone').value;
            const lang = document.getElementById('pref-lang').value;

            const systemPrompt = `Act as AR Solver. Subject: ${currentSubject}. Tone: ${tone}. Language: ${lang}. 
            Provide step-by-step explanations. Transcribe images if present. Use Google Search for accuracy. 
            Do not use LaTeX delimiters. Format with Markdown. Ensure clarity for students.`;

            const parts = [{ text: "Student Question: " + inputEl.value }];
            if(imageBase64) {
                parts.push({ inline_data: { mime_type: imageType, data: imageBase64 } });
            }

            const payload = {
                contents: [{ role: "user", parts }],
                tools: [{ google_search: {} }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { 
                    temperature: 0.2,
                    topP: 0.95,
                    maxOutputTokens: 2048
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if(!response.ok) throw new Error(data.error?.message || "API Error: Please check your configuration.");

                const answer = data.candidates[0].content.parts[0].text;
                document.getElementById('solution-content').innerHTML = parseMarkdown(answer);
                resultArea.classList.remove('hidden');
                resultArea.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                errorBox.innerText = "Error: " + err.message;
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                btnTxt.classList.remove('hidden');
            }
        }

        function parseMarkdown(t) {
            return t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/^\- (.*$)/gim, '<li>$1</li>')
                    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                    .split('\n\n').map(p => `<p>${p}</p>`).join('');
        }
    </script>
</body>
</html>
